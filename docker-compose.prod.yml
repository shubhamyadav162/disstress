version: '3.8'

services:
  fwb-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_ADMIN_PASSWORD=${VITE_ADMIN_PASSWORD}
        - VITE_API_URL=/api/v1
    container_name: fwb-frontend
    restart: unless-stopped
    ports:
      - "3080:80"
    environment:
      - VITE_API_URL=/api/v1
      - VITE_ADMIN_PASSWORD=${VITE_ADMIN_PASSWORD}
    networks:
      - fwb-network

  fwb-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fwb-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - FRONTEND_URL=${FRONTEND_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${FRONTEND_URL}/api/v1/auth/google/callback
    depends_on:
      fwb-postgres:
        condition: service_healthy
    networks:
      - fwb-network

  fwb-postgres:
    image: postgres:15-alpine
    container_name: fwb-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=primedistress
    networks:
      - fwb-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d primedistress"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  fwb-network:
    driver: bridge