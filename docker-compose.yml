version: '3.8'

# Prime Distress Properties - VPS Deployment
# Coexists with hyper-liquid-airline on same server

services:
  # PostgreSQL Database for Prime Distress Properties
  fwb-postgres:
    image: postgres:15-alpine
    container_name: fwb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fwb_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: primedistress
    volumes:
      - fwb_postgres_data:/var/lib/postgresql/data
    networks:
      - fwb-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fwb_user -d primedistress"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (internal port 5000)
  fwb-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fwb-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://fwb_user:${POSTGRES_PASSWORD}@fwb-postgres:5432/primedistress
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${FRONTEND_URL}/api/v1/auth/google/callback
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      fwb-postgres:
        condition: service_healthy
    networks:
      - fwb-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (internal port 80, exposed as 3080 externally)
  fwb-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-}
        - VITE_ADMIN_PASSWORD=${VITE_ADMIN_PASSWORD}
        - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}
    container_name: fwb-frontend
    restart: unless-stopped
    ports:
      - "3080:80"  # External port 3080 to avoid conflict with hyper-liquid on 80/443
    depends_on:
      - fwb-backend
    networks:
      - fwb-network

  # WhatsApp Service (internal port 4000)
  fwb-whatsapp:
    build:
      context: "./WhatsApp back end server"
      dockerfile: Dockerfile
    container_name: fwb-whatsapp
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - "./WhatsApp back end server/auth_info:/app/auth_info"
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
    networks:
      - fwb-network

networks:
  fwb-network:
    driver: bridge
    name: fwb-network

volumes:
  fwb_postgres_data:
    name: fwb_postgres_data
